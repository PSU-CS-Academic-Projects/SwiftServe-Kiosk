{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Customer Login - Klassy Cafe</title>
    <link rel="stylesheet" type="text/css" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'css/font-awesome.css' %}">
    <link rel="stylesheet" href="{% static 'css/templatemo-klassy-cafe.css' %}">
    <link rel="stylesheet" href="{% static 'css/kiosk.css' %}">
    <style>
        body {
            background: linear-gradient(135deg, #ff6b4a 0%, #fb5849 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
        }

        .auth-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 450px;
            width: 100%;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h1 {
            color: #333;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .auth-header p {
            color: #999;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            border-color: #fb5849;
            outline: none;
            box-shadow: 0 0 0 3px rgba(251, 88, 73, 0.1);
        }

        .error-message {
            background-color: #fee;
            color: #c33;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            border-left: 4px solid #c33;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #ff6b4a 0%, #fb5849 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
        }

        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .auth-footer a {
            color: #fb5849;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #fb5849;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .cafe-logo {
            font-size: 32px;
            color: #fb5849;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <a href="{% url 'home' %}" class="back-link"><i class="fa fa-arrow-left"></i> Back to Home</a>
        
        <div class="auth-header">
            <div class="cafe-logo"><i class="fa fa-cutlery"></i></div>
            <h1>Welcome Back</h1>
            <p>Login to track your orders</p>
        </div>

        {% if error %}
        <div class="error-message">
            <i class="fa fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="phone_or_email">Phone Number or Email</label>
                <input type="text" id="phone_or_email" name="phone_or_email" required 
                       placeholder="Enter your phone or email">
            </div>

            <button type="submit" class="btn-login">
                <i class="fa fa-sign-in"></i> Login
            </button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="{% url 'customer_register' %}">Register here</a>
        </div>
    </div>

    <script src="{% static 'js/jquery-2.1.0.min.js' %}"></script>
    <script src="{% static 'js/bootstrap.min.js' %}"></script>
</body>
</html>
