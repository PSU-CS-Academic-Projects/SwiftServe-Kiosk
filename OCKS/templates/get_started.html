{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container text-center my-5">
  <h1 class="display-4">Get Started</h1>
  <p class="lead">Explore our menu. Tap Get Started to place an order.</p>

  <div class="d-flex justify-content-center mt-4">
    <a href="{% url 'kiosk_menu' %}" class="btn btn-lg btn-primary">Get Started</a>
  </div>

  <div id="menuCarousel" class="carousel slide mt-4" data-ride="carousel">
    <div class="carousel-inner">
      {% for item in carousel_items %}
      <div class="carousel-item {% if forloop.first %}active{% endif %}">
        {% if item.image %}
          <img src="{{ item.image.url }}" class="d-block w-100" alt="{{ item.name }}" style="height:420px; object-fit:cover;">
        {% else %}
          <img src="{% static 'images/slide-01.jpg' %}" class="d-block w-100" alt="" style="height:420px; object-fit:cover;">
        {% endif %}
      </div>
      {% endfor %}
    </div>
    <a class="carousel-control-prev" href="#menuCarousel" role="button" data-slide="prev">
      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
      <span class="sr-only">Previous</span>
    </a>
    <a class="carousel-control-next" href="#menuCarousel" role="button" data-slide="next">
      <span class="carousel-control-next-icon" aria-hidden="true"></span>
      <span class="sr-only">Next</span>
    </a>
  </div>
</div>

<script>
// auto-cycle carousel every 3s
(function(){
  try{
    $('.carousel').carousel({ interval: 3000 });
  }catch(e){}
})();
</script>

{% endblock %}
